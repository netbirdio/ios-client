name: Build and Upload to App Store Connect

on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
        description: 'Git ref to checkout and build'
      build-number:
        required: false
        type: string
        default: ''
        description: 'Build number override (defaults to GITHUB_RUN_NUMBER)'
      version:
        required: false
        type: string
        default: ''
        description: 'Marketing version override (e.g. from git tag)'

concurrency:
  group: build-upload-${{ inputs.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-upload:
    name: Archive and Upload
    runs-on: macos-15
    steps:
      - name: Select Xcode 26.1.1
        run: sudo xcode-select -s /Applications/Xcode_26.1.1.app/Contents/Developer

      - name: Checkout ios-client
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          path: ios-client

      - name: Checkout netbird
        uses: actions/checkout@v4
        with:
          repository: netbirdio/netbird
          path: netbird

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: netbird/go.sum

      - name: Install gomobile
        run: go install golang.org/x/mobile/cmd/gomobile@v0.0.0-20251113184115-a159579294ab

      - name: Build NetBirdSDK xcframework
        working-directory: ios-client
        run: ./build-go-lib.sh ../netbird

      - name: Setup App Store Connect API key
        working-directory: ios-client
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8

      - name: Install distribution certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DISTRIBUTION_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Create and configure temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Store keychain password for cleanup
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Create GoogleService-Info.plist
        working-directory: ios-client
        env:
          PLIST_BASE64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        run: |
          if [ -n "$PLIST_BASE64" ]; then
            echo "$PLIST_BASE64" | base64 --decode > GoogleService-Info.plist
          else
            cat > GoogleService-Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CLIENT_ID</key><string>dummy</string>
            <key>REVERSED_CLIENT_ID</key><string>dummy</string>
            <key>API_KEY</key><string>dummy</string>
            <key>GCM_SENDER_ID</key><string>dummy</string>
            <key>PLIST_VERSION</key><string>1</string>
            <key>BUNDLE_ID</key><string>io.netbird.app</string>
            <key>PROJECT_ID</key><string>dummy</string>
            <key>STORAGE_BUCKET</key><string>dummy</string>
            <key>IS_ADS_ENABLED</key><false/>
            <key>IS_ANALYTICS_ENABLED</key><false/>
            <key>IS_APPINVITE_ENABLED</key><false/>
            <key>IS_GCM_ENABLED</key><false/>
            <key>IS_SIGNIN_ENABLED</key><false/>
            <key>GOOGLE_APP_ID</key><string>dummy</string>
          </dict>
          </plist>
          EOF
          fi

      - name: Determine build settings
        id: settings
        run: |
          BUILD_NUMBER="${{ inputs.build-number }}"
          if [ -z "$BUILD_NUMBER" ]; then
            BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          fi
          echo "build-number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

          VERSION="${{ inputs.version }}"
          if [ -n "$VERSION" ]; then
            echo "version-args=MARKETING_VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version-args=" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve Swift packages
        working-directory: ios-client
        run: |
          xcodebuild -resolvePackageDependencies \
            -project NetBird.xcodeproj \
            -scheme NetBird

      - name: Archive
        working-directory: ios-client
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild archive \
            -project NetBird.xcodeproj \
            -scheme NetBird \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/NetBird.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/".appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8" \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_ISSUER_ID" \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=TA739QLA7A \
            CURRENT_PROJECT_VERSION=${{ steps.settings.outputs.build-number }} \
            ${{ steps.settings.outputs.version-args }}

      - name: Export and Upload to App Store Connect
        working-directory: ios-client
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/NetBird.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/".appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8" \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_ISSUER_ID"

      - name: Clean up signing assets
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          rm -rf ~/.appstoreconnect/private_keys 2>/dev/null || true
          rm -f $RUNNER_TEMP/certificate.p12 2>/dev/null || true
