name: TestFlight

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: testflight-${{ github.ref }}-${{ github.head_ref || github.actor_id }}
  cancel-in-progress: true

jobs:
  gate:
    name: Validate trigger
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.resolve.outputs.ref }}
      should-build: ${{ steps.resolve.outputs.should-build }}
      upload: ${{ steps.resolve.outputs.upload }}
      netbird-ref: ${{ steps.resolve.outputs.netbird-ref }}
      version: ${{ steps.resolve.outputs.version }}
      build-number: ${{ steps.resolve.outputs.build-number }}
    steps:
      - name: Checkout (for git tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          sparse-checkout: .

      - name: Resolve version from latest tag
        id: derive-version
        run: |
          LATEST_TAG=$(git describe --tags --match 'v*' --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            echo "::error::No v* tags found — cannot derive version"
            exit 1
          elif ! echo "$LATEST_TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Latest tag '$LATEST_TAG' is not valid semver (expected vX.Y.Z)"
            exit 1
          else
            VERSION="${LATEST_TAG#v}"
            MAJOR="${VERSION%%.*}"
            REST="${VERSION#*.}"
            MINOR="${REST%%.*}"
            PATCH="${REST#*.}"
            NEXT_PATCH=$((PATCH + 1))
            NEXT_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}"
            echo "version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
            echo "Latest tag: $LATEST_TAG → next version: $NEXT_VERSION"
          fi

      - name: Resolve build ref
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            core.setOutput('build-number', '${{ github.run_number }}');

            const derived = '${{ steps.derive-version.outputs.version }}';
            if (derived) {
              core.setOutput('version', derived);
            }

            if (context.eventName === 'push') {
              core.setOutput('ref', context.sha);
              core.setOutput('should-build', 'true');
              core.setOutput('upload', 'true');
              core.info(`Main push, version: ${derived}`);
              return;
            }

            if (context.eventName === 'pull_request') {
              core.setOutput('ref', context.payload.pull_request.head.sha);
              core.setOutput('should-build', 'true');
              core.setOutput('upload', 'true');
              core.info(`PR #${context.payload.pull_request.number}, version: ${derived}`);
            }

  build:
    name: Build and Upload
    needs: gate
    if: needs.gate.outputs.should-build == 'true'
    uses: ./.github/workflows/build-upload.yml
    with:
      ref: ${{ needs.gate.outputs.ref }}
      netbird-ref: ${{ needs.gate.outputs.netbird-ref }}
      version: ${{ needs.gate.outputs.version }}
      build-number: ${{ needs.gate.outputs.build-number }}
      upload: ${{ needs.gate.outputs.upload == 'true' }}
    secrets: inherit

  notify:
    name: Notify PR
    needs: [gate, build]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment build result on PR
        uses: actions/github-script@v7
        with:
          script: |
            const buildResult = '${{ needs.build.result }}';
            const ref = '${{ needs.gate.outputs.ref }}';
            const shortSha = ref.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const prNumber = context.payload.pull_request.number;
            const version = '${{ needs.gate.outputs.version }}' || 'default';
            const buildNumber = '${{ needs.gate.outputs.build-number }}';

            let body;
            if (buildResult === 'success') {
              body = `**TestFlight build uploaded** \`${version} (${buildNumber})\` for \`${shortSha}\`\n\nThe build has been submitted to App Store Connect and will be available in TestFlight shortly.\n\n[View workflow run](${runUrl})`;
            } else if (buildResult === 'skipped') {
              return;
            } else {
              body = `**Build failed** for \`${shortSha}\`\n\n[View workflow run](${runUrl})`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body,
            });
