name: TestFlight

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: testflight-${{ github.ref }}-${{ github.head_ref || github.actor_id }}
  cancel-in-progress: true

jobs:
  gate:
    name: Validate trigger
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.resolve.outputs.ref }}
      should-build: ${{ steps.resolve.outputs.should-build }}
      upload: ${{ steps.resolve.outputs.upload }}
      netbird-ref: ${{ steps.resolve.outputs.netbird-ref }}
      version: ${{ steps.resolve.outputs.version }}
      build-number: ${{ steps.resolve.outputs.build-number }}
    steps:
      - name: Checkout (for git tags)
        if: github.event_name == 'push'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          sparse-checkout: .

      - name: Resolve version from latest tag
        if: github.event_name == 'push'
        id: derive-version
        run: |
          LATEST_TAG=$(git describe --tags --match 'v*' --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            echo "version=0.0.1" >> "$GITHUB_OUTPUT"
            echo "No version tags found, defaulting to 0.0.1"
          else
            VERSION="${LATEST_TAG#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            NEXT_PATCH=$((PATCH + 1))
            NEXT_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}"
            echo "version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
            echo "Latest tag: $LATEST_TAG → next version: $NEXT_VERSION"
          fi

      - name: Resolve build ref and validate
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            // Push to main — always build and upload
            if (context.eventName === 'push') {
              core.setOutput('ref', context.sha);
              core.setOutput('should-build', 'true');
              core.setOutput('upload', 'true');

              // Use version derived from latest tag (patch bumped)
              const derived = '${{ steps.derive-version.outputs.version }}';
              if (derived) {
                core.setOutput('version', derived);
                core.info(`Main push, derived version: ${derived}`);
              }
              return;
            }

            // PR opened/updated — build if not from fork
            if (context.eventName === 'pull_request') {
              const headRepo = context.payload.pull_request.head.repo.full_name;
              const baseRepo = `${context.repo.owner}/${context.repo.repo}`;

              if (headRepo !== baseRepo) {
                core.info(`Skipping fork PR from ${headRepo}`);
                core.setOutput('should-build', 'false');
                return;
              }

              core.setOutput('ref', context.payload.pull_request.head.sha);
              core.setOutput('should-build', 'true');

              // Parse /testflight line from PR description for upload flag and parameters
              const body = context.payload.pull_request.body || '';
              const hasTestflight = body.includes('/testflight');
              core.setOutput('upload', hasTestflight ? 'true' : 'false');
              core.info(`PR description ${hasTestflight ? 'contains' : 'does not contain'} /testflight, upload=${hasTestflight}`);

              const lines = body.split('\n');
              for (const line of lines) {
                const trimmed = line.trim();
                if (!trimmed.startsWith('/testflight')) continue;

                core.info(`Found /testflight line: ${trimmed}`);
                const netbirdRefMatch = trimmed.match(/netbird-ref=(\S+)/);
                if (netbirdRefMatch) {
                  core.setOutput('netbird-ref', netbirdRefMatch[1]);
                  core.info(`Using netbird-ref: ${netbirdRefMatch[1]}`);
                }
                const versionMatch = trimmed.match(/version=(\S+)/);
                if (versionMatch) {
                  core.setOutput('version', versionMatch[1]);
                  core.info(`Using version: ${versionMatch[1]}`);
                }
                const buildNumberMatch = trimmed.match(/build-number=(\S+)/);
                if (buildNumberMatch) {
                  core.setOutput('build-number', buildNumberMatch[1]);
                  core.info(`Using build-number: ${buildNumberMatch[1]}`);
                }
                break;
              }
            }

  build:
    name: Build and Upload
    needs: gate
    if: needs.gate.outputs.should-build == 'true'
    uses: ./.github/workflows/build-upload.yml
    with:
      ref: ${{ needs.gate.outputs.ref }}
      netbird-ref: ${{ needs.gate.outputs.netbird-ref }}
      version: ${{ needs.gate.outputs.version }}
      build-number: ${{ needs.gate.outputs.build-number }}
      upload: ${{ needs.gate.outputs.upload == 'true' }}
    secrets: inherit

  notify:
    name: Notify PR
    needs: [gate, build]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment build result on PR
        uses: actions/github-script@v7
        with:
          script: |
            const buildResult = '${{ needs.build.result }}';
            const ref = '${{ needs.gate.outputs.ref }}';
            const shortSha = ref.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const prNumber = context.payload.pull_request.number;

            const uploaded = '${{ needs.gate.outputs.upload }}' === 'true';
            const version = '${{ needs.gate.outputs.version }}' || 'default';
            const buildNumber = '${{ needs.gate.outputs.build-number }}' || '${{ github.run_number }}';

            let body;
            if (buildResult === 'success' && uploaded) {
              body = `**TestFlight build uploaded** \`${version} (${buildNumber})\` for \`${shortSha}\`\n\nThe build has been submitted to App Store Connect and will be available in TestFlight shortly.\n\n[View workflow run](${runUrl})`;
            } else if (buildResult === 'success') {
              body = `**Build succeeded** for \`${shortSha}\` (no upload — add \`/testflight\` to PR description to upload)\n\n[View workflow run](${runUrl})`;
            } else if (buildResult === 'skipped') {
              return;
            } else {
              body = `**Build failed** for \`${shortSha}\`\n\n[View workflow run](${runUrl})`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body,
            });
